services:
  - type: web
    name: food-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false # Set manually in dashboard (Supabase URI)
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false # e.g. '["https://your-frontend.vercel.app"]'
